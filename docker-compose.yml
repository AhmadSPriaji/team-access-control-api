services:
  # Database Utama (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: team-access-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ahmadsiddiq
      POSTGRES_DB: team_access_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d team_access_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # In-memory store (Redis) untuk Rate Limiting & Session caching
  redis:
    image: redis:7-alpine
    container_name: team-access-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: